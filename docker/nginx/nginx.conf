# bind-mounted into the nginx container read-only (see docker-compose.yml) -
# editing this file on the host and restarting nginx is enough to pick up changes,
# no image rebuild needed, which is the whole point of a bind mount for config
#
# no "user" directive here on purpose: this runs on nginxinc/nginx-unprivileged,
# which already drops to a non-root user, so master process doesn't need root
# to bind port 80 the way stock nginx would (see docker-compose.yml comments)
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    upstream app_upstream {
        server app:8080;
    }

    server {
        listen 8080;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location / {
            proxy_pass http://app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
