spring.application.name=docker-assignment-app

# defaults match the mysql service in docker-compose.yml; override with real env
# vars when running the plain "docker run" version against a different host
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:taskdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:taskuser}
spring.datasource.password=${DB_PASSWORD:taskpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# fine for this assignment, would switch to migrations (Flyway/Liquibase) on a real project
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${SERVER_PORT:8080}
spring.jpa.open-in-view=false

# exposes /actuator/health, used by the Dockerfile HEALTHCHECK and the CI workflow
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
